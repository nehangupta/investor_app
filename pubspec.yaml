name: investor_app
description: Mini Investor Deal Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3       # BLoC state management
  equatable: ^2.0.5           # Compare states by value
  shared_preferences: ^2.2.2  # Local storage for session & interests
  fl_chart: ^0.66.2           # ROI projection chart
  google_fonts: ^6.1.0        # Inter font

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
